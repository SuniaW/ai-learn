spring:
  application:
    name: policy-rag-system
  ai:
    ollama:
      base-url: http://8.140.221.150:11434
      chat:
        model: qwen2.5:1.5b
        options:
          temperature: 0.3 # 政策问答需要严谨，降低温度
      embedding:
        model: bge-m3 # 确保 Ollama 中有此模型
    vectorstore:
      milvus:
        client:
          host: 8.140.221.150
          port: 19530
        collection-name: policy_docs
        embedding-dimension: 1024 # 需与 Embedding 模型维度一致
server:
  port: 8081


logging:
  file:
    name: logs/rag-system.log # 日志将保存在项目根目录下的 logs 文件夹中
  level:
    # 1. 开启你自己项目包的 Debug 日志
    com.ailearn.governmentaffairsrag: DEBUG

    # 2. 开启 Spring AI 的 Debug 日志 (非常重要！可以看到发送给大模型的真实 Prompt)
    org.springframework.ai: DEBUG

    # 3. 开启 Milvus 向量数据库交互的 Debug 日志
    io.milvus: DEBUG

    # 4. 如果需要看 Web 请求的底层细节，可以开启这个
    org.springframework.web: DEBUG