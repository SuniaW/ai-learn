server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; # 核心配置：支持 Vue Router 环境
    }

    # 如果有后端接口代理，可以在此配置
    # location /api {
    #    proxy_pass http://your-backend-api;
    # }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}